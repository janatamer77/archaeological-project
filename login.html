    <!-- Start Login container -->
        <div class="login-container">
        <div class="login-header">
            <h1>Welcome to Secret of Kemet</h1>
            <p>We are glad that you want to learn about Egyptian antiquities</p>
        </div>
        <!-- Email form -->
        <p id="error"></p>
        <form id="loginForm" onsubmit="return login()">
            <div class="form-group">
                <input type="text" class="form-input" id="email" required>
                <label for="email">Email or Phone</label>
            </div>
            <!-- Password form -->
            <div class="form-group">
                <input type="password" class="form-input" id="password" required>
                <label for="password">Password</label>
            </div>
            
            <div class="form-options">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#forgot-password" class="forgot-password">Forgot password?</a>
            </div>

            <button type="submit" class="login-button">Login</button>
            <!-- Line divides  -->
            <div class="divider">
                <hr>
                <span class="divider-text">Or</span>
                <hr>
            </div>

            <div class="social-login">
                <button type="button" class="social-button google" aria-label="Sign in with Google">
                    <img src="images/google-logo-48.png" alt="">
                    <span>Sign in with Google</span>
                </button>
                <button type="button" class="social-button facebook" aria-label="Sign in with Facebook">
                    <img src="images/facebook-logo-48.png" alt="">
                </button>
            </div>
        </form>

        <div class="signup-prompt">
            <p>Don't have an account? <a href="sign-in.html">Sign up</a></p>
        </div>
    </div>
