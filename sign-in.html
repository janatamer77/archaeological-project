    <style>:root {

--purple-focus: #8749f2;

}
.dark-mode{
    --main-color: #ffffff;
    --white: #3b2f00;
    --accent: #f5a623;
    --dark: #0d0e12;
    --text-muted: #ffffffa6;
    --purple-focus: #ffffff;
    --border-light: #000000;
    --text-secondary: #ffffff;

        }

}

a{

         /* log in button */
.button{

    border-radius: 10px;

    font-weight: bold;

}

}

}

.login-container {
position: relative;
width: 100%;
max-width: 470px;
padding: 40px 30px;
background: var(--white);
border: 1px solid var(--accent);
border-radius: 10px;
box-shadow: 0 4px 20px rgba(62, 44, 35, 0.1);
margin: 100px;
}

.login-header {
display: flex;
flex-direction: column;
text-align: center;
margin-bottom: 50px;
}

.login-header h1 {
font-family: 'Poppins', sans-serif;
color: var(--accent);
font-size: 28px;
font-weight: 700;
margin-bottom: 8px;
}

.login-header p {
font-family: 'Poppins', sans-serif;
color: var(--text-secondary);
font-size: 14px;
line-height: 1.5;
}

.form-group {
position: relative;
width: 100%;
margin-bottom: 20px;
}

.form-group label {
position: absolute;
top: 15px;
left: 15px;
color: var(--accent);
font-size: 14px;
pointer-events: none;
transition: all 0.3s ease-in-out;
}

.form-group input[type="text"],
.form-group input[type="password"] {
width: 100%;
height: 50px;
font-size: 16px;
color: var(--main-color);
padding-left: 15px;
border: 1px solid var(--accent);
border-radius: 10px;
outline: none;
transition: border-color 0.3s ease, box-shadow 0.3s ease;
background-color: var(--white);
}

.form-group input[type="text"]:focus,
.form-group input[type="password"]:focus {
border-color: var(--purple-focus);
box-shadow: 0 0 0 3px rgba(135, 73, 242, 0.1);
}

.form-group input[type="text"]:focus ~ label,
.form-group input[type="text"]:valid ~ label,
.form-group input[type="password"]:focus ~ label,
.form-group input[type="password"]:valid ~ label {
top: -10px;
left: 12px;
font-size: 12px;
background: var(--white);
padding: 0 5px;
color: var(--purple-focus);
}

.form-group input[type="text"]:valid ~ label,
.form-group input[type="password"]:valid ~ label {
color: var(--accent);
}

.form-options {
display: flex;
justify-content: space-between;
align-items: center;
margin-bottom: 25px;
font-size: 14px;
gap: 10px;
}

.checkbox-wrapper {
display: flex;
align-items: center;
gap: 8px;
}

.checkbox-wrapper input[type="checkbox"] {
width: 18px;
height: 18px;
cursor: pointer;
accent-color: var(--accent);
}

.checkbox-wrapper label {
cursor: pointer;
color: var(--text-secondary);
margin: 0;
}

.forgot-password {
text-decoration: none;
color: var(--main-color);
font-weight: 500;
transition: color 0.3s ease;
}

.forgot-password:hover {
color: var(--accent);
}

.login-button {
width: 100%;
height: 50px;
font-family: 'Poppins', sans-serif;
font-size: 16px;
font-weight: 600;
color: var(--white);
background: var(--main-color);
border: none;
border-radius: 10px;
cursor: pointer;
transition: all 0.3s ease;
margin-bottom: 30px;
}

.login-button:hover {
background: #2f2419;
transform: translateY(-2px);
box-shadow: 0 4px 12px rgba(62, 44, 35, 0.3);
}

.login-button:active {
transform: translateY(0);
}

.divider {
position: relative;
margin: 30px 0;
display: flex;
align-items: center;
}

.divider hr {
flex: 1;
border: none;
border-top: 1px solid #e0e0e0;
}

.divider-text {
padding: 0 15px;
color: #999;
font-size: 13px;
font-weight: 500;
}

.social-login {
display: flex;
gap: 12px;
margin-bottom: 30px;
}

.social-button {
display: flex;
align-items: center;
justify-content: center;
gap: 10px;
height: 50px;
border: 1px solid var(--border-light);
border-radius: 8px;
background: var(--white);
cursor: pointer;
transition: all 0.3s ease;
font-size: 14px;
font-weight: 500;
color: var(--text-secondary);
}

.social-button:hover {
border-color: var(--main-color);
background: #fafafa;
transform: translateY(-2px);
}

.social-button img {
width: 20px;
height: 20px;
}

.social-button.google {
flex: 1;
}

.social-button.facebook {
flex: 0 0 50px;
padding: 0;
}

.signup-prompt {
text-align: center;
padding: 20px 0 0 0;
border-top: 1px solid #f0f0f0;
}

.signup-prompt p {
font-size: 14px;
color: var(--text-secondary);
}

.signup-prompt a {
color: var(--accent);
text-decoration: none;
font-weight: 600;
transition: color 0.3s ease;
}

.signup-prompt a:hover {
color: var(--main-color);
}
</style>
